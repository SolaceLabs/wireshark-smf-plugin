name: Build MacOS

on:
  workflow_call:
    inputs:
      MAJOR_VERSION:
        description: "Version string for wireshark tag needed to build can be v#.#.# or v#.#.#-rc#"
        type: string
        required: true
        default: "4"
      MINOR_VERSION:
        description: "Minor version of the wireshark tag"
        type: string
        required: true
        default: "0"
      PATCH_VERSION:
        description: "Patch version of the wireshark tag"
        type: string
        required: true
        default: "5"

jobs:
  macos:
    name: Build on MacOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Checkout Wireshark
        uses: actions/checkout@v4
        with:
          repository: wireshark/wireshark
          path: "./wireshark"
          ref: v${{ inputs.MAJOR_VERSION }}.${{ inputs.MINOR_VERSION }}.${{ inputs.PATCH_VERSION }}
      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: 3.8
      - name: Install deps
        continue-on-error: true
        run: |
          brew install opus c-ares glib libgcrypt gnutls lua cmake python nghttp2 snappy lz4 libxml2 ninja \
            libmaxminddb libsmi spandsp brotli minizip zstd libssh libilbc speexdsp gettext pcre2 "$@"

          # install sparkle
          curl -o /tmp/sparkle.rb https://raw.githubusercontent.com/Homebrew/homebrew-cask/c6dfe6baf1639998ba1707f68668cf8fa97bac9d/Casks/sparkle.rb
          brew install /tmp/sparkle.rb
          rm /tmp/sparkle.rb

          # install qt5
          brew install qt@5
          qt5_dir="$(brew --prefix)/opt/qt@5/lib/cmake/Qt5"
          echo "Qt5_DIR=$qt5_dir" >> $GITHUB_ENV

      - name: Link SMF plugin
        shell: bash
        run: |
          ln -s ${{ github.workspace }}/src/CMakeListsCustom.txt  ${{ github.workspace }}/wireshark/CMakeListsCustom.txt
          ln -s ${{ github.workspace }}/src/smf  ${{ github.workspace }}/wireshark/plugins/epan/smf

      - name: Mkdir
        run: mkdir build

      - name: Cmake
        working-directory: build
        env:
          CMAKE_PREFIX_PATH: ${{ env.Qt5_DIR }}
          Qt5_DIR: ${{ env.Qt5_DIR }}
        run: |
          cmake -GNinja  ${{ github.workspace }}/wireshark -DCMAKE_POLICY_DEFAULT_CMP0094=NEW

      - name: Build
        run: ninja
        working-directory: build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v2
        with:
          name: wireshark-smf-macos
          path: ${{ github.workspace }}/build/run/Wireshark.app/Contents/PlugIns/wireshark/**/epan/smf.so
